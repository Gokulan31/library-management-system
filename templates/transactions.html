{% extends 'base.html' %}
{% block title %}Transactions – Library MS{% endblock %}

{% block sidebar %}
<div class="sidebar">
    <a href="{{ url_for('book_available') }}" class="txn-sidebar-link {% if request.endpoint == 'book_available' %}active{% endif %}">Is book available?</a>
    <a href="{{ url_for('book_issue') }}" class="txn-sidebar-link {% if request.endpoint == 'book_issue' %}active{% endif %}">Issue book?</a>
    <a href="{{ url_for('return_book') }}" class="txn-sidebar-link {% if request.endpoint == 'return_book' %}active{% endif %}">Return book?</a>
    <a href="{{ url_for('pay_fine') }}" class="txn-sidebar-link {% if request.endpoint == 'pay_fine' %}active{% endif %}">Pay Fine?</a>
</div>
{% endblock %}

{% block content %}
<div class="page-title">Transactions</div>
<p style="color:var(--text-muted); font-size:0.9rem;">Select an option from the sidebar to proceed.</p>
{% endblock %}
