{% macro maintenance_sidebar() %}
<div class="sidebar">
    <span class="sidebar-heading">Housekeeping</span>
    <div class="sidebar-section">
        <span class="sidebar-link top-level" style="cursor:default;">Membership</span>
        <a href="{{ url_for('add_membership') }}" class="sidebar-link {% if request.endpoint == 'add_membership' %}active{% endif %}">Add</a>
        <a href="{{ url_for('update_membership') }}" class="sidebar-link {% if request.endpoint == 'update_membership' %}active{% endif %}">Update</a>
    </div>
    <div class="sidebar-section">
        <span class="sidebar-link top-level" style="cursor:default;">Books/Movies</span>
        <a href="{{ url_for('add_book') }}" class="sidebar-link {% if request.endpoint == 'add_book' %}active{% endif %}">Add</a>
        <a href="{{ url_for('update_book') }}" class="sidebar-link {% if request.endpoint == 'update_book' %}active{% endif %}">Update</a>
    </div>
    <div class="sidebar-section">
        <span class="sidebar-link top-level" style="cursor:default;">User Management</span>
        <a href="{{ url_for('user_management') }}" class="sidebar-link {% if request.endpoint == 'user_management' %}active{% endif %}">Add</a>
        <a href="{{ url_for('user_management') }}" class="sidebar-link {% if request.endpoint == 'user_management' %}active{% endif %}">Update</a>
    </div>
</div>
{% endmacro %}
